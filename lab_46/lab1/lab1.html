<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f5f5;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.gallery img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
  transition: transform 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}
</style>

</head>
<body>

<div class="gallery">
  <img src="https://picsum.photos/id/1011/400/300">
  <img src="https://picsum.photos/id/1025/400/300">
  <img src="https://picsum.photos/id/1035/400/300">
  <img src="https://picsum.photos/id/1043/400/300">
  <img src="https://picsum.photos/id/1059/400/300">
  <img src="https://picsum.photos/id/1069/400/300">
</div>

</body>
</html>
