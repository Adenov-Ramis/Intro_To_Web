<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Modal Navigation</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.gallery img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.gallery img:hover { transform: scale(1.05); }

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
  display: block;
}

.close-btn {
  position: fixed;
  top: 20px;
  right: 30px;
  font-size: 34px;
  color: #fff;
  cursor: pointer;
  user-select: none;
  line-height: 1;
}

.nav-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 54px;
  height: 54px;
  border: none;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  font-size: 28px;
  cursor: pointer;
  user-select: none;
  display: grid;
  place-items: center;
}

.nav-btn:hover { background: rgba(255, 255, 255, 0.28); }

#prev { left: 20px; }
#next { right: 20px; }
</style>
</head>
<body>

<div class="gallery" id="gallery">
  <img src="https://picsum.photos/id/1011/800/600" alt="">
  <img src="https://picsum.photos/id/1025/800/600" alt="">
  <img src="https://picsum.photos/id/1035/800/600" alt="">
  <img src="https://picsum.photos/id/1043/800/600" alt="">
  <img src="https://picsum.photos/id/1059/800/600" alt="">
  <img src="https://picsum.photos/id/1069/800/600" alt="">
</div>

<div class="modal" id="modal">
  <span class="close-btn" id="close">&times;</span>
  <button class="nav-btn" id="prev" aria-label="Previous">&#8592;</button>
  <img class="modal-content" id="modal-img" alt="">
  <button class="nav-btn" id="next" aria-label="Next">&#8594;</button>
</div>

<script>
const imgs = Array.from(document.querySelectorAll("#gallery img"));
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.getElementById("close");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

let i = 0;

function openAt(idx) {
  i = (idx + imgs.length) % imgs.length;
  modalImg.src = imgs[i].src;
  modal.style.display = "flex";
}

function showNext() { openAt(i + 1); }
function showPrev() { openAt(i - 1); }

imgs.forEach((img, idx) => {
  img.onclick = () => openAt(idx);
});

closeBtn.onclick = () => { modal.style.display = "none"; };

modal.onclick = e => {
  if (e.target === modal) modal.style.display = "none";
};

nextBtn.onclick = e => { e.stopPropagation(); showNext(); };
prevBtn.onclick = e => { e.stopPropagation(); showPrev(); };
</script>

</body>
</html>
