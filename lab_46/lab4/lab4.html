<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Gallery</title>

<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.gallery img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.gallery img:hover { transform: scale(1.05); }

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.close-btn {
  position: fixed;
  top: 20px;
  right: 30px;
  font-size: 34px;
  color: #fff;
  cursor: pointer;
}

.nav-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 54px;
  height: 54px;
  border: none;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  color: #fff;
  font-size: 28px;
  cursor: pointer;
}

.nav-btn:hover { background: rgba(255,255,255,0.28); }

#prev { left: 20px; }
#next { right: 20px; }
</style>

</head>
<body>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
  <span class="close-btn" id="close">&times;</span>
  <button class="nav-btn" id="prev">&#8592;</button>
  <img class="modal-content" id="modal-img">
  <button class="nav-btn" id="next">&#8594;</button>
</div>

<script>
const imageList = [
  "https://picsum.photos/id/1011/800/600",
  "https://picsum.photos/id/1025/800/600",
  "https://picsum.photos/id/1035/800/600",
  "https://picsum.photos/id/1043/800/600",
  "https://picsum.photos/id/1059/800/600",
  "https://picsum.photos/id/1069/800/600"
];

const gallery = document.getElementById("gallery");

imageList.forEach(url => {
  const img = document.createElement("img");
  img.src = url;
  gallery.appendChild(img);
});

const imgs = Array.from(document.querySelectorAll("#gallery img"));
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.getElementById("close");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

let index = 0;

function openAt(i) {
  index = (i + imgs.length) % imgs.length;
  modalImg.src = imgs[index].src;
  modal.style.display = "flex";
}

imgs.forEach((img, i) => {
  img.onclick = () => openAt(i);
});

prevBtn.onclick = e => { e.stopPropagation(); openAt(index - 1); };
nextBtn.onclick = e => { e.stopPropagation(); openAt(index + 1); };

closeBtn.onclick = () => modal.style.display = "none";

modal.onclick = e => { if (e.target === modal) modal.style.display = "none"; };
</script>

</body>
</html>
