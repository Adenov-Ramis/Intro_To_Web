<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Font Example</title>

    <style>
        @font-face {
            font-family: 'custom';
            src: url('PlaywriteINGuides-Regular.ttf') format('woff2'),
                 url('PlaywriteINGuides-Regular.ttf') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        h1 {
            font-family: 'custom', sans-serif;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <h1>Custom Font in H1</h1>
</body>
</html>
