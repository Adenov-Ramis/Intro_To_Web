<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradients in CSS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="box linear-right">Linear: to right</div>
    <div class="box linear-left">Linear: to left</div>
    <div class="box linear-bottom">Linear: to bottom</div>
    <div class="box linear-diagonal">Linear: 45deg</div>
    <div class="box linear-stops">Linear: color stops</div>
    <div class="box linear-hard-split">Linear: hard stop</div>

    <div class="box radial-default">Radial: default</div>
    <div class="box radial-ellipse">Radial: ellipse</div>
    <div class="box radial-offset">Radial: offset center</div>
    <div class="box radial-stops">Radial: color stops</div>

</body>
</html>
