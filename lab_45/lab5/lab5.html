<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
.item { border: 1px solid #e6e6e6; border-radius: 10px; padding: 10px; background: #fff; }
.item img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; display: block; }
.item p { margin: 8px 0 0; font-size: 14px; line-height: 1.3; }
</style>
</head>
<body>

<div class="gallery" id="gallery"></div>

<script>
fetch("https://jsonplaceholder.typicode.com/photos?_limit=5")
  .then(r => r.json())
  .then(d => {
    const g = document.getElementById("gallery");
    d.forEach(p => {
      const div = document.createElement("div");
      div.className = "item";
      const img = document.createElement("img");
      img.src = "https://picsum.photos/seed/" + p.id + "/400/300";
      const cap = document.createElement("p");
      cap.textContent = p.title;
      div.appendChild(img);
      div.appendChild(cap);
      g.appendChild(div);
    });
  });
</script>

</body>
</html>
