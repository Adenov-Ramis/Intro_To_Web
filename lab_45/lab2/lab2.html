<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posts</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}
.card {
  background: #fff;
  padding: 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.card h2 {
  font-size: 20px;
  margin: 0 0 10px 0;
}
.card p {
  margin: 0;
  font-size: 16px;
}
</style>
</head>
<body>

<div id="posts"></div>

<script>
fetch("https://jsonplaceholder.typicode.com/posts")
  .then(r => r.json())
  .then(d => {
    const c = document.getElementById("posts");
    d.slice(0, 5).forEach(p => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = "<h2>" + p.title + "</h2><p>" + p.body + "</p>";
      c.appendChild(div);
    });
  });
</script>

</body>
</html>
